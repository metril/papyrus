services:
  papyrus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    volumes:
      - papyrus_data:/app/data
      - cups_spool:/var/spool/cups
    environment:
      - PAPYRUS_DB_URL=postgresql+asyncpg://papyrus:${POSTGRES_PASSWORD:-secret}@localhost:5432/papyrus
      - PAPYRUS_ENCRYPTION_KEY=${PAPYRUS_ENCRYPTION_KEY}
      - PAPYRUS_SESSION_SECRET=${PAPYRUS_SESSION_SECRET}
      - PAPYRUS_BASE_URL=${PAPYRUS_BASE_URL:-http://localhost:8080}
      - PAPYRUS_ADMIN_USERNAME=${PAPYRUS_ADMIN_USERNAME:-admin}
      - PAPYRUS_ADMIN_PASSWORD=${PAPYRUS_ADMIN_PASSWORD}
      - PAPYRUS_DEV_MODE=${PAPYRUS_DEV_MODE:-false}
    labels:
      - traefik.enable=true
      - traefik.http.routers.papyrus.rule=Host(`${PAPYRUS_HOSTNAME:-papyrus.localhost}`)
      - traefik.http.services.papyrus.loadbalancer.server.port=8080
    depends_on:
      db:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=papyrus
      - POSTGRES_USER=papyrus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
    healthcheck:
      test: pg_isready -U papyrus
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  papyrus_data:
  cups_spool:
  pgdata:
