# sane-airscan configuration for Brother DCP-L2540DW
# This printer uses WSD (not eSCL) for scanning
#
# If automatic WSD discovery doesn't work in Docker,
# uncomment and set the printer's IP address below:
#
# [devices]
# Brother DCP-L2540DW = http://192.168.1.100:80/wsd, wsd

[options]
# discovery = enable
