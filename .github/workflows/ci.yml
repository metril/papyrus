name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: papyrus
          POSTGRES_PASSWORD: papyrus
          POSTGRES_DB: papyrus_test
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U papyrus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: ruff check app tests

      - name: Pytest
        working-directory: backend
        env:
          PAPYRUS_TEST_DB_URL: postgresql+asyncpg://papyrus:papyrus@localhost:5433/papyrus_test
        run: pytest -q --junitxml=pytest.xml

      - name: Fail if any tests were skipped
        working-directory: backend
        run: |
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse("pytest.xml").getroot()
          skipped = sum(int(suite.get("skipped", 0)) for suite in root.iter("testsuite"))
          print(f"skipped tests: {skipped}")
          if skipped:
              print(
                  "::error::Integration tests were skipped in CI — the test "
                  "Postgres service must be reachable here. Check the "
                  "postgres service health check and PAPYRUS_TEST_DB_URL."
              )
              sys.exit(1)
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Eslint
        working-directory: frontend
        run: npx eslint .

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
